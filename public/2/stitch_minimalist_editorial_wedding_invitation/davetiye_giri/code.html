<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #FAFAF8;
        }
        .animate-subtle-bounce {
            animation: subtle-bounce 2s infinite ease-in-out;
        }
        @keyframes subtle-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(6px); }
        }
        .hero-canvas {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-top: 64px;
            padding-bottom: 96px;
        }

<body class="font-body-md text-on-surface selection:bg-secondary-fixed/30 overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-md border-b border-outline-variant/30 flex items-center justify-between px-margin-mobile md:px-margin-desktop h-16">
<div class="flex items-center gap-4">

</div>

<!-- Middle: Headline Section -->

<!-- Bottom: Date & Interaction Section -->

            </p>
<!-- Scroll Indicator -->
<div class="flex flex-col items-center gap-2 opacity-40 animate-subtle-bounce">

<span class="material-symbols-outlined text-[16px]">expand_more</span>
</div>

<div class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-primary/5 rounded-full blur-[100px] translate-y-1/2 -translate-x-1/4"></div>
</div>
<script>
        // Simple scroll interaction to fade elements
        window.addEventListener('scroll', () => {
            const scrolled = window.scrollY;
            const scrollIndicator = document.querySelector('.animate-subtle-bounce');
            if (scrolled > 50) {
                scrollIndicator.style.opacity = '0';
                scrollIndicator.style.transition = 'opacity 0.5s ease';
            } else {
                scrollIndicator.style.opacity = '0.4';
            }
        });

        // Click interaction for top bar icon
        document.querySelector('.material-symbols-outlined[data-icon="favorite"]')?.addEventListener('mousedown', function() {
            this.style.transform = 'scale(0.8)';
        });
        document.querySelector('.material-symbols-outlined[data-icon="favorite"]')?.addEventListener('mouseup', function() {
            this.style.transform = 'scale(1)';
        });
    </script>
